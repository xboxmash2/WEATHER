<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
}

.container {
    width: 100%;
    max-width: 900px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
}

.parent-card {
    display: flex;
    gap: 20px;
}

.card {
    flex: 1;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h3 {
    margin-bottom: 10px;
    font-weight: 500;
}

.input-group {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    padding: 12px 18px;
    background: #f97316;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #ea580c;
    transform: translateY(-1px);
}

/* Weather cards */
.weather-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.06);
}

/* History pills */
.history {
    margin-top: 10px;
}

.history button {
    background: rgba(255,255,255,0.1);
    margin: 5px 5px 0 0;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
}

.history button:hover {
    background: #f97316;
}

/* Mobile */
@media (max-width: 700px) {
    .parent-card {
        flex-direction: column;
    }
}
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <!-- <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div> -->

    </div>

    <script>
        const API_KEY = "30b4f1931b45e816c8edad5629a2076d";
        //    const API_KEY = "af9f63c59a649f27d602b96a43d0bd14";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

         /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temperature</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind Speed</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

       /* ---------- SAVE HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            if (!history.includes(city)) {
                history.unshift(city);
            }

            history = history.slice(0, 5);

            localStorage.setItem("weatherHistory", JSON.stringify(history));

            showHistory();
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            const history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            historyBox.innerHTML = "";

            history.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;

                btn.onclick = () => {
                    search(city);
                };

                historyBox.appendChild(btn);
            });
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
       
        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
