<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #fff;
}

/* Layout */
.app {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.header h1 {
    font-size: 24px;
}

.search {
    display: flex;
    gap: 10px;
}

.search input {
    padding: 10px;
    border-radius: 6px;
    border: none;
    width: 200px;
}

.search button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

/* Main layout */
.main {
    display: flex;
    gap: 20px;
}

/* Weather panel */
.weather-panel {
    flex: 2;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 12px;
    padding: 30px;
    min-height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.weather-panel h2 {
    font-size: 32px;
}

.weather-panel .temp {
    font-size: 60px;
    font-weight: bold;
}

.placeholder {
    text-align: center;
    opacity: 0.8;
}

/* Sidebar */
.sidebar {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Cards */
.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

.card h3 {
    margin-bottom: 10px;
}

/* Details */
#detailsBox div {
    margin-bottom: 6px;
}

/* History */
#history button {
    width: 100%;
    margin-bottom: 6px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    background: #334155;
    color: white;
    cursor: pointer;
}

#history button:hover {
    background: #475569;
}

/* Responsive */
@media (max-width: 768px) {
    .main {
        flex-direction: column;
    }

    .search input {
        width: 100%;
    }
}
/* Weather content */
.weather-content {
    text-align: center;
}

.weather-top h2 {
    font-size: 24px;
    margin-bottom: 5px;
}

.condition {
    opacity: 0.8;
    margin-bottom: 10px;
}

.weather-temp {
    font-size: 64px;
    font-weight: bold;
    margin-top: 10px;
}

/* Details grid */
#detailsBox {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.detail-item {
    background: #334155;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
}

.detail-item span {
    font-size: 12px;
    opacity: 0.7;
}

.detail-item strong {
    font-size: 16px;
    margin-top: 4px;
}
</style>
</head>

<body>
    <div class="app">

    <!-- HEADER -->
    <header class="header">
        <h1>WeatherScope</h1>
        <div class="search">
            <input id="cityInput" placeholder="Search city...">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- LEFT: WEATHER -->
        <section class="weather-panel" id="weather">
            <div class="placeholder">
                <h2>Search a city</h2>
                <p>Get real-time weather insights</p>
            </div>
        </section>

        <!-- RIGHT: SIDEBAR -->
        <aside class="sidebar">

            <div class="card">
                <h3>Details</h3>
                <div id="detailsBox"></div>
            </div>

            <div class="card">
                <h3>Recent Searches</h3>
                <div id="history"></div>
            </div>

        </aside>

    </main>

</div>
    <script>
        const API_KEY = "30b4f1931b45e816c8edad5629a2076d";
        //    const API_KEY = "af9f63c59a649f27d602b96a43d0bd14";

        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- WEATHER FETCH ---------- */
        async function getWeather(city) {

            // small delay for smoother UI
            // await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );
            if (!res.ok) {
                alert("city not found");
                throw new Error("City not found");
            }
            const data = await res.json();
            return data;
        }

         /* ---------- BUTTON CLICK ---------- */
        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) {
                search(city);
            }
        };

        /* ---------- UI RENDER ---------- */
        function renderWeather(d) {
    document.getElementById("weather").innerHTML = `
        <div class="weather-content">
            <div class="weather-top">
                <h2>${d.name}, ${d.sys.country}</h2>
                <p class="condition">${d.weather[0].main}</p>
            </div>

            <div class="weather-temp">
                ${Math.round(d.main.temp)}°C
            </div>
        </div>
    `;

    document.getElementById("detailsBox").innerHTML = `
        <div class="detail-item">
            <span>🌡 Feels Like</span>
            <strong>${Math.round(d.main.feels_like)}°C</strong>
        </div>
        <div class="detail-item">
            <span>💧 Humidity</span>
            <strong>${d.main.humidity}%</strong>
        </div>
        <div class="detail-item">
            <span>🌬 Wind</span>
            <strong>${d.wind.speed} m/s</strong>
        </div>
        <div class="detail-item">
            <span>ضغط Pressure</span>
            <strong>${d.main.pressure} hPa</strong>
        </div>
    `;
}

       /* ---------- SAVE HISTORY ---------- */
        function saveHistory(city) {
            let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            if (!history.includes(city)) {
                history.unshift(city);
            }

            history = history.slice(0, 5);

            localStorage.setItem("weatherHistory", JSON.stringify(history));

            showHistory();
        }

        /* ---------- SHOW HISTORY ---------- */
        function showHistory() {
            const history = JSON.parse(localStorage.getItem("weatherHistory")) || [];

            historyBox.innerHTML = "";

            history.forEach(city => {
                const btn = document.createElement("button");
                btn.textContent = city;

                btn.onclick = () => {
                    search(city);
                };

                historyBox.appendChild(btn);
            });
        }

        /* ---------- SEARCH FUNCTION ---------- */
        async function search(city) {
            weatherBox.innerHTML = "";
            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name); 
            } catch (error) {
                weatherBox.innerHTML = `<p style="color:red">${error.message}</p>`;
            }
        }
       
        /* ---------- ENTER KEY SEARCH ---------- */
        cityInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const city = cityInput.value.trim();
                if (city) {
                    search(city);
                }
            }
        });
        /* ---------- INITIAL LOAD ---------- */
        showHistory();
    </script>
</body>

</html>
